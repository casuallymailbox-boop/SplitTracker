<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Workout Tracker</h1>
            <button id="theme-toggle" class="theme-btn" title="Toggle Dark Mode">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </header>

        <section class="log-section">
            <h2>Log Workout</h2>
            <form id="workout-form">
                <div class="form-group">
                    <label for="workout-type">Workout Type</label>
                    <select id="workout-type" required>
                        <option value="">Select workout...</option>
                        <option value="push">Push</option>
                        <option value="pull">Pull</option>
                        <option value="shoulder">Shoulder</option>
                        <option value="leg">Leg</option>
                        <option value="upper">Upper</option>
                        <option value="arms">Arms</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="workout-notes">Notes (optional)</label>
                    <textarea id="workout-notes" rows="3" placeholder="e.g., Bench press 3x10, Squats 4x8..."></textarea>
                </div>
                <div class="form-group">
                    <label for="workout-date">Date</label>
                    <input type="date" id="workout-date" required>
                </div>
                <button type="submit" class="btn-primary">Log Workout</button>
            </form>
        </section>

        <section class="summary-section">
            <h2>This Week's Summary</h2>
            <div id="summary-container" class="summary-grid">
                <!-- Summary cards will be inserted here -->
            </div>
        </section>

        <section class="history-section">
            <h2>Workout History</h2>
            <div class="filter-controls">
                <label for="filter-type">Filter by:</label>
                <select id="filter-type">
                    <option value="all">All Workouts</option>
                    <option value="push">Push</option>
                    <option value="pull">Pull</option>
                    <option value="shoulder">Shoulder</option>
                    <option value="leg">Leg</option>
                    <option value="upper">Upper</option>
                    <option value="arms">Arms</option>
                </select>
            </div>
            <div id="history-container">
                <!-- History items will be inserted here -->
            </div>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
